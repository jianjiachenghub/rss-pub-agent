name: Daily News Pipeline

on:
  schedule:
    - cron: '10 16 * * *'  # UTC 16:10 = Beijing 00:10 (next day)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Compute pipeline date
        run: |
          echo "PIPELINE_DATE=$(TZ=Asia/Shanghai date -d 'yesterday' +%F)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: cd scripts && npm ci

      - name: Run pipeline
        run: cd scripts && npx tsx graph.ts
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          FOLO_SESSION_TOKEN: ${{ secrets.FOLO_SESSION_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          REPORT_BASE_URL: ${{ secrets.REPORT_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}

      - name: Generate index
        run: cd scripts && npx tsx generate-index.ts

      - name: Commit and push content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ content/
          if git diff --staged --quiet; then
            echo "No content changes to commit"
            exit 0
          fi
          git commit -m "daily: ${PIPELINE_DATE}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
